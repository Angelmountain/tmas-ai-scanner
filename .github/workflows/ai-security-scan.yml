name: AI Security Scan

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/ai-security-scan.yml'
  workflow_dispatch:
    inputs:
      # === Vision One ===
      vision_one_api_key:
        description: 'Vision One API Key (TMAS authentication)'
        required: true
        type: string

      vision_one_region:
        description: 'Vision One Region'
        required: true
        type: choice
        default: 'eu-central-1'
        options:
          - 'us-east-1'
          - 'eu-central-1'
          - 'ap-southeast-2'
          - 'ap-south-1'
          - 'ap-northeast-1'
          - 'ap-southeast-1'
          - 'me-central-1'

      # === LLM Provider & Endpoint ===
      llm_provider:
        description: 'LLM Provider (sets default endpoint & model)'
        required: true
        type: choice
        default: 'openai'
        options:
          - 'openai'
          - 'anthropic'
          - 'azure_openai'
          - 'ollama'
          - 'custom'

      llm_endpoint:
        description: 'LLM API endpoint URL (leave default to use provider preset)'
        required: false
        type: string
        default: ''

      llm_api_key:
        description: 'API key for the LLM endpoint (not required for Ollama)'
        required: false
        type: string
        default: 'not-needed'

      llm_model:
        description: 'Model name (e.g. gpt-4, gpt-4o, claude-sonnet-4-6, llama3). Leave empty to use provider default.'
        required: false
        type: string
        default: ''

      # === Scan Settings ===
      attack_preset:
        description: 'Attack preset to use'
        required: true
        type: choice
        default: 'owasp'
        options:
          - 'owasp'
          - 'mitre'

      system_prompt:
        description: '(Optional) System prompt to test against'
        required: false
        type: string

jobs:
  ai-security-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install and start LiteLLM proxy (Anthropic)
      if: inputs.llm_provider == 'anthropic'
      env:
        ANTHROPIC_API_KEY: ${{ inputs.llm_api_key }}
      run: |
        pip install 'litellm[proxy]'

        MODEL_NAME="${{ inputs.llm_model }}"
        MODEL_NAME="${MODEL_NAME:-claude-sonnet-4-6}"

        echo "Starting LiteLLM proxy for anthropic/${MODEL_NAME}..."
        nohup litellm --model "anthropic/${MODEL_NAME}" --port 4000 --host 0.0.0.0 > litellm.log 2>&1 &
        echo $! > litellm.pid

        # Wait for proxy to be ready
        for i in $(seq 1 30); do
          if curl -sf http://localhost:4000/health > /dev/null 2>&1; then
            echo "LiteLLM proxy is ready on port 4000"
            break
          fi
          echo "Waiting for LiteLLM proxy... ($i/30)"
          sleep 2
        done

        if ! curl -sf http://localhost:4000/health > /dev/null 2>&1; then
          echo "ERROR: LiteLLM proxy failed to start"
          cat litellm.log
          exit 1
        fi

    - name: Install and start Ollama
      if: inputs.llm_provider == 'ollama'
      run: |
        curl -fsSL https://ollama.com/install.sh | sh

        # Start Ollama server in background
        nohup ollama serve > ollama.log 2>&1 &
        echo $! > ollama.pid

        # Wait for Ollama to be ready
        for i in $(seq 1 30); do
          if curl -sf http://localhost:11434/api/tags > /dev/null 2>&1; then
            echo "Ollama server is ready"
            break
          fi
          echo "Waiting for Ollama... ($i/30)"
          sleep 2
        done

        MODEL_NAME="${{ inputs.llm_model }}"
        MODEL_NAME="${MODEL_NAME:-llama3}"

        echo "Pulling model: ${MODEL_NAME}..."
        ollama pull "${MODEL_NAME}"
        echo "Model ${MODEL_NAME} ready"
        ollama list

    - name: Install TMAS CLI
      run: |
        echo "Fetching latest TMAS version..."
        METADATA=$(curl -sf https://ast-cli.xdr.trendmicro.com/tmas-cli/metadata.json)
        TMAS_VERSION=$(echo "$METADATA" | jq -r '.latestVersion' | sed 's/^v//')
        echo "Latest version: ${TMAS_VERSION}"

        DOWNLOAD_URL="https://ast-cli.xdr.trendmicro.com/tmas-cli/${TMAS_VERSION}/tmas-cli_Linux_x86_64.tar.gz"
        echo "Downloading from: ${DOWNLOAD_URL}"
        curl -sf "${DOWNLOAD_URL}" -o tmas.tar.gz
        tar -xzf tmas.tar.gz tmas
        rm tmas.tar.gz
        chmod +x tmas

        echo "TMAS version:"
        ./tmas version

    - name: Generate scan configuration
      run: |
        ARGS="--api-key-env LLM_API_KEY --preset ${{ inputs.attack_preset }} --output config.yaml"
        ARGS="$ARGS --provider ${{ inputs.llm_provider }}"

        # When using Anthropic, route through LiteLLM proxy on localhost
        # When using Ollama, point to local Ollama server
        if [ "${{ inputs.llm_provider }}" = "anthropic" ]; then
          ARGS="$ARGS --endpoint http://localhost:4000/v1"
        elif [ "${{ inputs.llm_provider }}" = "ollama" ]; then
          ARGS="$ARGS --endpoint http://localhost:11434/v1"
        elif [ -n "${{ inputs.llm_endpoint }}" ]; then
          ARGS="$ARGS --endpoint ${{ inputs.llm_endpoint }}"
        fi

        if [ -n "${{ inputs.llm_model }}" ]; then
          ARGS="$ARGS --model ${{ inputs.llm_model }}"
        fi

        if [ -n "${{ inputs.system_prompt }}" ]; then
          ARGS="$ARGS --system-prompt \"${{ inputs.system_prompt }}\""
        fi

        eval python scripts/generate_config.py $ARGS

        echo "Generated config:"
        cat config.yaml

    - name: Run AI security scan
      env:
        TMAS_API_KEY: ${{ inputs.vision_one_api_key }}
        LLM_API_KEY: ${{ inputs.llm_api_key }}
        ANTHROPIC_API_KEY: ${{ inputs.llm_provider == 'anthropic' && inputs.llm_api_key || '' }}
      run: |
        python scripts/run_scan.py \
          --config config.yaml \
          --region "${{ inputs.vision_one_region }}" \
          --tmas-api-key "$TMAS_API_KEY" \
          --output-dir results \
          --verbose
      continue-on-error: true

    - name: Upload scan results
      if: always()
      id: upload-results
      uses: actions/upload-artifact@v4
      with:
        name: scan-${{ inputs.llm_provider }}-${{ inputs.llm_model || 'default' }}-${{ inputs.attack_preset }}
        path: results/
        retention-days: 30

    - name: Generate job summary
      if: always()
      run: |
        echo "## AI Security Scan Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Scan Configuration" >> $GITHUB_STEP_SUMMARY
        echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| **Provider** | \`${{ inputs.llm_provider }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| **Endpoint** | \`${{ inputs.llm_endpoint || 'provider default' }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| **Model** | \`${{ inputs.llm_model || 'provider default' }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| **Attack Preset** | \`${{ inputs.attack_preset }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| **Region** | \`${{ inputs.vision_one_region }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| **Timestamp** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if [ -f results/latest.json ]; then
          echo "### Results Summary" >> $GITHUB_STEP_SUMMARY
          EXIT_CODE=$(python3 -c "import json; d=json.load(open('results/latest.json')); print(d.get('exit_code','N/A'))")
          FINDINGS=$(python3 -c "import json; d=json.load(open('results/latest.json')); print(len(d.get('findings',[])))")
          echo "- **Exit Code:** \`${EXIT_CODE}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Findings:** ${FINDINGS}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
        fi

        echo "### Download Results" >> $GITHUB_STEP_SUMMARY
        echo "1. **[Download artifacts](${{ steps.upload-results.outputs.artifact-url }})**" >> $GITHUB_STEP_SUMMARY
        echo "2. Or go to [this run's artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Artifacts include:**" >> $GITHUB_STEP_SUMMARY
        echo "- \`latest.json\` - Machine-readable scan results" >> $GITHUB_STEP_SUMMARY
        echo "- \`latest.html\` - Styled HTML report (open in browser)" >> $GITHUB_STEP_SUMMARY
        echo "- Timestamped copies of both for historical tracking" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "---" >> $GITHUB_STEP_SUMMARY
        echo "*Powered by [Trend Micro Vision One](https://www.trendmicro.com/en_us/business/products/detection-response.html) TMAS AI Scanner*" >> $GITHUB_STEP_SUMMARY
